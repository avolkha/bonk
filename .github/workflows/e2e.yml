name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  e2e:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y bubblewrap squashfs-tools

      - name: Pull test images
        run: docker pull alpine:latest

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Probe bwrap
        run: |
          echo "=== bwrap version ==="
          bwrap --version
          echo "=== /etc/subuid ==="
          cat /etc/subuid || echo "(missing)"
          echo "=== /etc/subgid ==="
          cat /etc/subgid || echo "(missing)"
          echo "=== unshare-all uid=0 probe ==="
          bwrap --unshare-all --share-net --uid 0 --gid 0 \
            --bind / / --dev /dev --proc /proc \
            -- echo "bwrap-ok" && echo "probe: PASS" || echo "probe: FAIL (exit $?)"

      - name: Run e2e tests
        run: bash tests/e2e.sh
