name: Rust Quality Checks

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  rust-quality:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: rustup toolchain install stable --profile minimal --component rustfmt --component clippy

      - name: Check formatting
        run: cargo +stable fmt --all -- --check

      - name: Run clippy
        run: cargo +stable clippy --workspace --all-targets -- -D warnings

      - name: Run tests
        run: cargo +stable test --workspace

  conventional-commits:
    name: Conventional Commits
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install committed
        uses: taiki-e/install-action@v2
        with:
          tool: committed

      - name: Check commit messages
        run: committed HEAD~${{ github.event.pull_request.commits }}..HEAD
